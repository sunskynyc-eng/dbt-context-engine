# config.yaml
# All configuration for dbt-context-engine.

# --- Database connection ---
database:
  type: duckdb                          # duckdb / snowflake / bigquery / postgres
  path: /path/to/your/database.duckdb  # DuckDB only — path to the .duckdb file

# --- dbt project ---
dbt:
  project_dir: /path/to/your/dbt/project  # directory containing dbt_project.yml
  profiles_dir: ~/.dbt                     # directory containing profiles.yml
  target: dev                              # dbt target to use

# --- Collection settings ---
collection:
  sample_percentage: 1.0      # percentage of rows to sample per table
  min_sample_rows: 20         # never sample fewer than this
  max_sample_rows: 1000       # never sample more than this

  # schema filtering
  # if include_schemas is set only these schemas are collected
  # takes priority over skip_schemas and skip_schema_patterns
  include_schemas: []

  # schemas to always skip regardless of other settings
  skip_schemas:
    - information_schema
    - pg_catalog

  # wildcard patterns to skip — supports * wildcard
  # handles personal, test, and CI schemas at scale
  skip_schema_patterns:
    - "*_dev"
    - "*_test"
    - "*_sandbox"
    - "*_scratch"
    - "pr_*"
    - "dbt_cloud_*"

  # skip schemas where schema name matches owner name
  # detects personal development schemas in Snowflake and BigQuery
  # not implemented for DuckDB — ignored in local development
  skip_owner_schemas: true

# --- LLM settings ---
llm:
  model: claude-sonnet-4-20250514  # Anthropic model to use
  max_tokens: 1000                  # max tokens per inference call
  # API key is read from environment variable ANTHROPIC_API_KEY
  # Never store API keys in this file

# --- Output settings ---
output:
  snapshots_dir: snapshots/
  format: text                # text / json
  keep_last_n_runs: 3        # number of collection runs to retain

# --- Importance ranking ---
importance_ranking:

  # weights across three dimensions — must sum to 1.0
  weights:
    reliability: 0.4    # test coverage, documentation, freshness
    usage:       0.4    # query frequency, downstream count, exposures
    scale:       0.2    # row count, rows added, refresh duration

  # dbt models score higher than raw tables by default
  # added to final score after dimension weighting
  dbt_model_bonus: 0.1

  # freshness decay — applied as multiplier to reliability score
  # None timestamp — no penalty applied, returns 1.0
  freshness_decay:
    under_24h:   1.0    # refreshed today — full reliability score
    under_7d:    0.9    # refreshed this week — minimal penalty
    under_30d:   0.7    # refreshed this month — moderate penalty
    under_90d:   0.5    # refreshed this quarter — significant penalty
    under_365d:  0.2    # refreshed this year — heavy penalty
    over_365d:   0.0    # not refreshed in over a year — zeroed out

  # gating rules — models below these thresholds are capped
  # regardless of other signals
  gating:
    no_description_no_tests_cap: 0.2   # black box models
    failing_tests_cap:           0.3   # untrustworthy models
    stale_model_cap:             0.1   # not refreshed in over a year